# =============================================================================
# Конфигурация виртуальных машин для virt-manager / libvirt
# =============================================================================
# ВАЖНО: поле `vm_name` должно ТОЧНО совпадать с именем домена в virt-manager.
# Проверить список доступных имён:  virsh -c qemu:///system list --all
# =============================================================================

# URI подключения к libvirt.
# qemu:///system  — системный экземпляр (ВМ видны всем, нужен доступ к группе libvirt)
# qemu:///session — пользовательский экземпляр (ВМ только текущего пользователя)
libvirt:
  uri: "qemu:///system"
  connect_timeout: 10      # Таймаут подключения к libvirt, сек
  connect_retries: 3       # Попыток переподключения при обрыве
  retry_backoff: 2.0       # Множитель экспоненциальной задержки между попытками

vms:
  windows:
    # Имя ВМ в virt-manager (как отображается в списке доменов)
    vm_name: "win_11_auto-test"
    description: "Windows 11 — UI тесты"
    enabled: true
    os_type: "windows"

    # ВТОРОЙ QMP-сокет для управления UI (клавиатура/мышь/скриншоты).
    # Это НЕ монитор libvirt — libvirt держит свой монопольно.
    # Добавляется в XML домена через <qemu:commandline>, см. README.
    qmp_socket: "/var/lib/libvirt/qemu/win_11_auto-test.qmp"

    # Путь к тестам для этой ОС
    test_path: "./tests/windows"

    # Ожидаемые ресурсы (для проверки перед запуском; ВМ НЕ пересоздаётся).
    # Значения сверены с фактическим доменом: virsh dominfo win_11_auto-test
    memory: 8000             # МБ
    cpu_cores: 6

    # Таймауты жизненного цикла ВМ, сек
    boot_timeout: 180        # Сколько ждать загрузки ОС после старта
    shutdown_timeout: 120    # Сколько ждать graceful shutdown до destroy

    # Автоматический вход в гостевую ОС. Выполняется один раз за сессию
    # pytest, до первого теста, фикстурой guest_login (tests/conftest.py).
    # Это подготовка окружения, а не тест: ничего не проверяет.
    login:
      enabled: true
      # Учётная запись, которую показывает экран входа. Набирать её не нужно —
      # она в системе одна и уже выбрана; держим для справки.
      username: "Test1"
      # ПАРОЛЯ ЗДЕСЬ НЕТ И БЫТЬ НЕ ДОЛЖНО: этот файл под git.
      # Пароль берётся из WINDOWS_LOGIN_PASSWORD (файл .env, он в .gitignore).
      # Имя пользователя при желании перекрывается WINDOWS_LOGIN_USER.
      boot_delay: 90           # Windows 11 грузится дольше Astra
      # Координаты — в пикселях гостя для видеорежима 1920x1200.
      # Проверено на живой ВМ 21.07.2026.
      steps:
        - {key: esc, wait: 3}              # убрать заставку блокировки
        - {click: [945, 660], wait: 0.5}   # поле «Пароль»
        - {type: "$password"}
        - {key: ret, wait: 25}             # войти и дождаться рабочего стола

    # Базовые настройки для UI-тестов
    ui_settings:
      # Фактический видеорежим гостя, снят через detect_resolution().
      # Если нужен 1920x1080 — менять надо в самой гостевой ОС, а не здесь.
      resolution: "1920x1200"
      scale_factor: 1.0

  astra:
    vm_name: "Astra_1_8_auto-test"
    description: "Astra Linux 1.8 — UI тесты"
    enabled: true
    os_type: "linux"
    qmp_socket: "/var/lib/libvirt/qemu/Astra_1_8_auto-test.qmp"
    test_path: "./tests/Astra"
    # Сверено с доменом: virsh dominfo Astra_1_8_auto-test
    memory: 8000
    cpu_cores: 4
    boot_timeout: 120
    shutdown_timeout: 90
    login:
      enabled: true
      username: "test"
      # ПАРОЛЯ ЗДЕСЬ НЕТ И БЫТЬ НЕ ДОЛЖНО: этот файл под git.
      # Пароль берётся из ASTRA_LOGIN_PASSWORD (файл .env, он в .gitignore).
      # Имя пользователя при желании перекрывается ASTRA_LOGIN_USER.
      # GRUB Loading (2с) + выбор загрузчика (3с) + ~30с до гритера fly-dm
      boot_delay: 40
      # Координаты — в пикселях гостя для видеорежима гритера 1280x800.
      # Проверено на живой ВМ 21.07.2026.
      steps:
        - {click: [640, 372], wait: 0.5}   # поле «Имя пользователя»
        - {type: "$username"}
        - {click: [615, 427], wait: 0.5}   # поле «Введите пароль»
        - {type: "$password"}
        - {click: [779, 427], wait: 2}     # синяя кнопка со стрелкой «>»
        # Диалог «Выбор атрибутов безопасности»: уровень целостности по
        # умолчанию «Высокий», при нём рабочий стол работает с ограничениями.
        - {click: [742, 381], wait: 1.5}   # раскрыть «Уровень целостности»
        - {click: [742, 413], wait: 1.5}   # выбрать «Низкий» — первый пункт
        - {click: [690, 491], wait: 10}    # кнопка «Войти»
        # Предупреждение «Ваш домашний каталог не даёт записать пробный файл»
        - {click: [918, 411], wait: 10}    # кнопка «Да»
    ui_settings:
      # Режим рабочего стола ПОСЛЕ входа — в нём и работают тесты.
      # Гритер fly-dm показывается в 1280x800, поэтому координаты в
      # login.steps заданы для 1280x800, а не для этого значения.
      resolution: "1920x1200"
      scale_factor: 1.0

  macos:
    vm_name: "macos-test"
    description: "macOS — UI тесты"
    # Домена macos-test в libvirt нет — секция отключена, чтобы проверки
    # готовности и run_tests.py не считали его отсутствие ошибкой.
    # Включить обратно, когда ВМ будет создана в virt-manager.
    enabled: false
    os_type: "macos"
    qmp_socket: "/var/lib/libvirt/qemu/macos-test.qmp"
    test_path: "./tests/macos"
    memory: 8192
    cpu_cores: 4
    boot_timeout: 300        # macOS грузится дольше
    shutdown_timeout: 180
    ui_settings:
      resolution: "2560x1440"
      scale_factor: 1.0

# =============================================================================
# Настройки тестирования
# =============================================================================
test_settings:
  timeout: 300               # Таймаут на один тест, сек
  retry_count: 3             # Попыток перезапуска упавшего теста
  parallel_workers: 2        # Максимум одновременно работающих ВМ

  screenshot_comparison:
    method: "ssim"           # Structural Similarity Index
    threshold: 0.99          # Порог прохождения: SSIM > 0.99
    save_diff: true          # Сохранять diff-изображение при несовпадении
    # Если размеры скриншота и эталона различаются — привести к размеру эталона.
    # false = считать тест упавшим при несовпадении размеров.
    resize_on_mismatch: false

# =============================================================================
# Логирование и артефакты
# =============================================================================
logging:
  log_dir: "./logs"
  # ВНЕ репозитория намеренно: screendump выполняет процесс QEMU от имени
  # libvirt-qemu, а тот не может пройти внутрь /home/romand (права 750).
  # Каталог принадлежит libvirt-qemu:kvm с g+w — QEMU пишет, мы читаем по kvm.
  screenshot_dir: "/var/lib/libvirt/screenshots"
  baseline_dir: "./baseline"     # Эталонные скриншоты
  diff_dir: "./screenshots/diff"
  report_dir: "./reports"
  log_level: "INFO"
  rotation_max_bytes: 10485760   # 10 МБ на файл лога
  rotation_backup_count: 5

# =============================================================================
# Kiwi TCMS (ЗАГЛУШКА — доступ появится позже)
# =============================================================================
# Пока enabled: false, результаты пишутся только локально в JSON/CSV,
# чтобы потом их можно было импортировать в Kiwi.
kiwi:
  enabled: false
  # TODO: заполнить, когда появится доступ к реальному Kiwi TCMS
  # url: "https://kiwi.company.com"
  # api_key: "your-api-key"        # лучше через переменную окружения KIWI_API_KEY
  # project_id: 1
  # test_run_name: "Automated UI Tests"

  # Локальный экспорт результатов (работает всегда, даже без Kiwi)
  local_export:
    enabled: true
    json_path: "./reports/kiwi_export.json"
    csv_path: "./reports/kiwi_export.csv"
