[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# pytest-asyncio: auto — не требует @pytest.mark.asyncio на каждом тесте.
# Это ini-опция, а не флаг в addopts (в addopts она ломает запуск).
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
# Тесты обязаны идти в ТОМ ЖЕ цикле, что и фикстуры. QMP-сессия открывается
# session-scoped фикстурой и регистрирует сокет в её цикле; тест в собственном
# цикле навсегда зависает на первом же await к этому сокету.
asyncio_default_test_loop_scope = session

markers =
    windows: Тесты для Windows ВМ
    astra: Тесты для Astra Linux ВМ
    macos: Тесты для macOS ВМ
    ui: UI-тесты со сравнением скриншотов
    smoke: Быстрые проверки доступности ВМ
    network: Сетевые тесты
    security: Тесты безопасности
    system: Системные тесты

addopts =
    -v
    --strict-markers
    --tb=short

# ВНИМАНИЕ: --maxfail=1 здесь намеренно НЕ задан.
# Он останавливал бы весь прогон ОС после первого падения, из-за чего
# остальные тесты не выполнялись бы и отчёт был бы неполным.
# Для такого поведения есть флаг run_tests.py --stop-on-fail.

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s - %(levelname)s - %(message)s
log_cli_date_format = %H:%M:%S

log_file = logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s - %(name)s - %(levelname)s - %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S
