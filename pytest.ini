[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# pytest-asyncio: auto — не требует @pytest.mark.asyncio на каждом тесте.
# Это ini-опция, а не флаг в addopts (в addopts она ломает запуск).
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
# Тесты обязаны идти в ТОМ ЖЕ цикле, что и фикстуры. QMP-сессия открывается
# session-scoped фикстурой и регистрирует сокет в её цикле; тест в собственном
# цикле навсегда зависает на первом же await к этому сокету.
asyncio_default_test_loop_scope = session

# Таймаут (--timeout) отсчитывается ТОЛЬКО для тела теста, без setup/teardown.
# Иначе он убивает подготовку сессии: загрузка ВМ (boot_timeout до 180с) и
# автологин (login.boot_delay 40–90с плюс сама последовательность) идут в setup
# первого теста и заведомо не укладываются в TEST_TIMEOUT=60. pytest-timeout
# рвал QMP-сессию прямо посреди набора пароля, и вход «ломался» на ровном месте.
timeout_func_only = true

markers =
    windows: Тесты для Windows ВМ
    astra: Тесты для Astra Linux ВМ
    macos: Тесты для macOS ВМ
    ui: UI-тесты со сравнением скриншотов
    app: Тесты, запускающие Altami Studio (сортируются в конец прогона)
    smoke: Быстрые проверки доступности ВМ
    network: Сетевые тесты
    security: Тесты безопасности
    system: Системные тесты

addopts =
    -v
    --strict-markers
    --tb=short

# ВНИМАНИЕ: --maxfail=1 здесь намеренно НЕ задан.
# Он останавливал бы весь прогон ОС после первого падения, из-за чего
# остальные тесты не выполнялись бы и отчёт был бы неполным.
# Для такого поведения есть флаг run_tests.py --stop-on-fail.

log_cli = true
# В консоль — только предупреждения и ошибки. На INFO туда лился весь ход
# работы с QMP, сравнения скриншотов и прочая диагностика, за которой не было
# видно самих тестов. Статусы тестов печатает src/interactive_plugin.py, а
# полный лог (вплоть до DEBUG) остаётся в logs/pytest.log и logs/test_run.log.
log_cli_level = WARNING
log_cli_format = %(asctime)s - %(levelname)s - %(message)s
log_cli_date_format = %H:%M:%S

# Имя файла задаётся в tests/conftest.py на каждый прогон:
# logs/pytest_<вм>_<дата>_<время>.log, плюс ссылка logs/pytest_<вм>_last.log на
# последний. Здесь его нет намеренно — один общий pytest.log дописывался бы
# бесконечно, и прогоны в нём было не разделить.
log_file_level = DEBUG
log_file_format = %(asctime)s - %(name)s - %(levelname)s - %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S
